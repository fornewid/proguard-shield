name: Publish

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    needs: []
    if: github.repository == 'fornewid/proguard-shield'
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Read current version
        id: version
        run: |
          VERSION=$(grep 'VERSION_NAME=' proguard-shield/gradle.properties | cut -d'=' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Copy CI gradle.properties
        if: ${{ !endsWith(steps.version.outputs.version, '-SNAPSHOT') }}
        run: mkdir -p ~/.gradle && cp .github/ci-gradle.properties ~/.gradle/gradle.properties

      - name: Set up JDK 17
        if: ${{ !endsWith(steps.version.outputs.version, '-SNAPSHOT') }}
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Gradle
        if: ${{ !endsWith(steps.version.outputs.version, '-SNAPSHOT') }}
        uses: gradle/actions/setup-gradle@v5

      - name: Publish to Maven Central
        if: ${{ !endsWith(steps.version.outputs.version, '-SNAPSHOT') }}
        run: ./gradlew :proguard-shield:publish --no-parallel --stacktrace
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_NEXUS_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_NEXUS_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}

      - name: Publish to Gradle Plugin Portal
        if: ${{ !endsWith(steps.version.outputs.version, '-SNAPSHOT') }}
        run: ./gradlew :proguard-shield:publishPlugins --no-parallel --stacktrace
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}

      - name: Create git tag
        if: ${{ !endsWith(steps.version.outputs.version, '-SNAPSHOT') }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

      - name: Bump to next SNAPSHOT version
        if: ${{ !endsWith(steps.version.outputs.version, '-SNAPSHOT') }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          IFS='.' read -r major minor patch <<< "$VERSION"
          NEXT_VERSION="$major.$minor.$((patch + 1))-SNAPSHOT"
          sed -i "s/VERSION_NAME=.*/VERSION_NAME=$NEXT_VERSION/" proguard-shield/gradle.properties
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add proguard-shield/gradle.properties
          git commit -m "Prepare next development version $NEXT_VERSION [skip ci]"
          git push
