name: Build

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Copy CI gradle.properties
        run: mkdir -p ~/.gradle && cp .github/ci-gradle.properties ~/.gradle/gradle.properties

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Verify release version
        if: startsWith(github.head_ref, 'release/')
        run: |
          VERSION=$(grep 'VERSION_NAME=' proguard-shield/gradle.properties | cut -d'=' -f2)
          if [[ "$VERSION" == *-SNAPSHOT ]]; then
            echo "::error::Release branch must not have -SNAPSHOT version: $VERSION"
            exit 1
          fi
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must be in major.minor.patch format: $VERSION"
            exit 1
          fi
          echo "Release version verified: $VERSION"

      - name: Build and check
        run: ./gradlew :proguard-shield:check --stacktrace

  agp-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Keep the set small: lowest supported AGP, and current tracked version.
        # Expand when a new AGP major lands or a compatibility issue is reported.
        agp: [ "8.0.0", "8.8.0" ]
    steps:
      - uses: actions/checkout@v6

      - name: Copy CI gradle.properties
        run: mkdir -p ~/.gradle && cp .github/ci-gradle.properties ~/.gradle/gradle.properties

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Integration tests against AGP ${{ matrix.agp }}
        run: ./gradlew :proguard-shield:gradleTest -PagpVersion=${{ matrix.agp }} --stacktrace
