name: Release Drafter

on:
  push:
    branches: [ main ]
    tags: [ '*.*.*' ]

permissions:
  contents: write
  pull-requests: read

jobs:
  update_draft_release:
    runs-on: ubuntu-latest
    if: github.repository == 'fornewid/proguard-shield'
    steps:
      - uses: release-drafter/release-drafter@v7.3.1
        with:
          publish: ${{ startsWith(github.ref, 'refs/tags/') }}
          # When publish.yml pushes a tag we want the GitHub Release to be
          # bound to that exact tag (e.g. 0.0.1), not whatever release-drafter
          # computes from `$NEXT_PATCH_VERSION`. Without this override the
          # template was evaluated at publish time and ended up minting a
          # bogus tag/release on the first release.
          tag: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
